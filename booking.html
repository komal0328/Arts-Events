<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="booking.css" />
  </head>
  <body>
    <section class="booking">
      <div class="booking-title">
        <h1>Book Your Event</h1>
        <p>
          Fill in your details & let us make your celebration unforgettable.
        </p>
      </div>

      <form>
        <div class="form-grid">
          <div class="input-box">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required />
          </div>

          <div class="input-box">
            <label>Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number" required />
          </div>

          <div class="input-box">
            <label>Email Address</label>
            <input type="email" placeholder="Enter email address " required />
          </div>

          <div class="input-box">
            <label>Number of Guest</label>
            <input type="number" placeholder="Approximately guest" required />
          </div>

          <div class="input-box">
            <label>Event Address</label>
            <textarea rows="3" placeholder="Enter event address"></textarea>
          </div>

          <div class="form-grid">
            <div class="input-box">
              <label>Event Date</label>
              <input type="date" required />
            </div>

            <div class="input-box">
              <label>Event Time</label>
              <input type="time" required />
            </div>
          </div>

          <div class="input-box">
            <label>Select Occasion</label>
            <select>
              <option>Wedding</option>
              <option>Engagement</option>
              <option>Birthday</option>
              <option>Baby Shower</option>
              <option>Baby Welcome</option>
              <option>Bride Welcome</option>
              <option>Festival</option>
              <option>House Warming</option>
              <option>Corporate Event</option>
              <option>Anniversary</option>
              <option>Other</option>
            </select>
          </div>

          <h2>Select Services</h2>
          <div class="service-grid">
            <label class="service-card">
              <input type="checkbox" /><span>Flower Decoration</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Balloon Decoration</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Mehendi</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Rangoli</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Wedding Decoration</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Haldi Decoration</span>
            </label>

            <label class="service-card">
              <input type="checkbox" /><span>Special Effects</span>
            </label>
          </div>

          <div class="input-box">
            <label
              >Budget (optional)
              <input type="number" placeholder="Enter budget here" />
            </label>
          </div>

          <div class="input-box">
            <label>Special Requirement</label>
            <textarea
              rows="5"
              placeholder="Write your requirement..."
            ></textarea>
          </div>

          <div class="input-box">
            <label>Upload Reference Image</label>
            <input type="file" />
          </div>

          <div class="terms">
            <input type="checkbox" required />
            <span>I agree to the Terms & Conditions</span>
          </div>

          <button class="book-btn" type="button" onclick="requestQuote()">
            Request Quote
          </button>
        </div>
      </form>
    </section>

    <script src="script.js"></script>
  </body>
</html>
